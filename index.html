<title>Facemash Filles</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;  /* Empêche le scroll */
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
}

body {
  display: flex;
  flex-direction: column;
  align-items: stretch; /* Le cadre prendra toute la largeur */
}

.header-text {
  background-color: #8B0000;
  color: white;
  width: 100%;
  text-align: center;
  padding: 30px 0;
  font-size: 3em;
  font-weight: bold;
  flex-shrink: 0;
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  width: 100%;
  box-sizing: border-box;
}

.duel-wrapper {
  border: 2px solid #8B0000;
  background-color: #fff;
  width: 100%;          
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 0;
  margin: 0;            
}

.text-container {
  text-align: center;
  margin: 0 0 30px 0;
  padding: 0 20px;
}

#message { font-size: 1.7em; font-weight: bold; color: #333; margin: 0 0 12px 0; }
#juju { font-size: 2em; font-weight: bold; color: #333; margin: 0 20px 5px 20px; }

.container {
  display: flex;
  justify-content: center;
  align-items: center;
}

.fille-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 10px;
}

.choice {
  width: 280px;
  height: 380px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #8B0000;
}

.or-text {
  font-size: 1.6em;
  color: #333;
  margin: 0 0.5 px;
  padding: 2px 0;       
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: normal;  
}
.houses {
  width: 100%;
  text-align: center;
  color: #00bfff;
  font-weight: bold;
  margin-top: 60px;
  font-size: 1.1em;
  letter-spacing: 0.05em;
}

.duel-links {
  text-align: center;
  color: #000;
  margin-top: 10px;
  font-size: 1em;
}
.duel-links span {
  margin: 0 15px;
  cursor: default;
  text-decoration: none;
  color: #000;
}

.flex-bottom {
  flex: 1;
}

@media (max-width: 600px) {
  .container { flex-direction: column; align-items: center; }
  .choice { width: 80%; height: auto; margin-bottom: 20px; }
  .or-text { margin: 10px 0; padding: 5px 0; }
  #message { font-size: 1.5em; }
  #juju { font-size: 1.8em; }
  .houses { font-size: 0.9em; }
}
</style>
</head>

<div class="header-text">FACEMASH</div>
<main>

  { nom: "Fille 99", image: "https://img.freepik.com/photos-gratuite/incroyable-jolie-jeune-femme-aux-cheveux-longs-au-chapeau-robe-lumiere-blanche-profitant-journee-ensoleillee-printemps-dans-jardin-fond-sakura-fleurs_291049-2200.jpg?w=740", score: 1000 },
  { nom: "Fille 100", image: "https://img.freepik.com/photos-premium/portrait-jeune-femme-debout-dans-ville_1048944-15590302.jpg?w=740", score: 1000 },

  { nom: "Fille 102", image: "https://img.freepik.com/photos-premium/portrait-belle-jeune-femme_1048944-8796156.jpg?w=740", score: 1000 },
];
const K = 32;
const container = document.getElementById("choicesContainer");
const pairesJouees = new Set();
const totalPairesMax = (toutesFilles.length * (toutesFilles.length-1))/2;

function tirerDeuxFillesUnique() {
  if (pairesJouees.size >= totalPairesMax) return null;
  let indexGauche, indexDroite, key;
  do {
    indexGauche = Math.floor(Math.random() * toutesFilles.length);
    do { indexDroite = Math.floor(Math.random() * toutesFilles.length); }
    while(indexDroite===indexGauche);
    key = [Math.min(indexGauche,indexDroite),Math.max(indexGauche,indexDroite)].join("-");
  } while(pairesJouees.has(key));
  pairesJouees.add(key);
  return [toutesFilles[indexGauche], toutesFilles[indexDroite]];
}

let [filleGauche, filleDroite] = tirerDeuxFillesUnique();

function calculerProbabilité(scoreA,scoreB) { return 1/(1+Math.pow(10,(scoreB-scoreA)/400)); }

function mettreAJourScores(gagnante,perdante){
  const pG=calculerProbabilité(gagnante.score,perdante.score);
  const pP=calculerProbabilité(perdante.score,gagnante.score);
  gagnante.score+=K*(1-pG);
  perdante.score+=K*(0-pP);
}

function afficherDuel(){
  container.innerHTML="";
  const leftWrapper=document.createElement("div"); leftWrapper.className="fille-container";
  const rightWrapper=document.createElement("div"); rightWrapper.className="fille-container";

  const leftImage=document.createElement("img");
  leftImage.src=filleGauche.image; leftImage.alt=filleGauche.nom; leftImage.className="choice";
  leftImage.onclick=()=>{ mettreAJourScores(filleGauche,filleDroite); const duo=tirerDeuxFillesUnique(); if(duo){[filleGauche,filleDroite]=duo; afficherDuel();} else { container.innerHTML="<p style='font-size:1.5em;color:#8B0000;font-weight:bold;'>🏁 Toutes les paires ont été jouées !</p>"; }};

  const rightImage=document.createElement("img");
  rightImage.src=filleDroite.image; rightImage.alt=filleDroite.nom; rightImage.className="choice";
  rightImage.onclick=()=>{ mettreAJourScores(filleDroite,filleGauche); const duo=tirerDeuxFillesUnique(); if(duo){[filleGauche,filleDroite]=duo; afficherDuel();} else { container.innerHTML="<p style='font-size:1.5em;color:#8B0000;font-weight:bold;'>🏁 Toutes les paires ont été jouées !</p>"; }};

  const orText=document.createElement("div"); orText.className="or-text"; orText.innerText="OR";

  container.appendChild(leftWrapper);
  leftWrapper.appendChild(leftImage);

  container.appendChild(orText);

  container.appendChild(rightWrapper);
  rightWrapper.appendChild(rightImage);
}

afficherDuel();
</script>
